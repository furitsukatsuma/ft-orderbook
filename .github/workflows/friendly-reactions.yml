# 協力開発者のコメント・PR に、絵文字リアクションだけで歓迎する（本文コメントはしない）
# スタンス: 友好的・AI を好きな仲間として迎える
name: Friendly emoji reactions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: read

jobs:
  react:
    runs-on: ubuntu-latest
    steps:
      - name: React with emoji only
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const actor = context.actor;
            const event = context.eventName;

            const bots = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
              'dependabot-preview[bot]',
              'renovate[bot]',
            ]);

            if (bots.has(actor) || actor.endsWith('[bot]')) {
              core.info(`Skip bot: ${actor}`);
              return;
            }

            // メンテナー本人の操作には反応しない
            const ownerLogin = owner.toLowerCase();
            if (actor.toLowerCase() === ownerLogin) {
              core.info('Skip maintainer own event');
              return;
            }

            const welcome = ['heart', 'hooray', 'rocket', 'eyes', '+1'];
            const pick = (seed) => welcome[Number(seed) % welcome.length];

            async function reactToIssue(issueNumber, content) {
              await github.rest.reactions.createForIssue({
                owner,
                repo,
                issue_number: issueNumber,
                content,
              });
            }

            async function reactToComment(commentId, content) {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: commentId,
                content,
              });
            }

            try {
              if (event === 'issue_comment') {
                const c = context.payload.comment;
                if (!c || c.user?.type === 'Bot') return;
                const emoji = pick(c.id);
                await reactToComment(c.id, emoji);
                core.info(`Reacted ${emoji} on issue comment ${c.id} by ${actor}`);
                return;
              }

              if (event === 'pull_request_review_comment') {
                const c = context.payload.comment;
                if (!c || c.user?.type === 'Bot') return;
                const emoji = pick(c.id);
                await reactToComment(c.id, emoji);
                core.info(`Reacted ${emoji} on review comment ${c.id} by ${actor}`);
                return;
              }

              if (event === 'issues') {
                const issue = context.payload.issue;
                if (!issue || issue.user?.type === 'Bot') return;
                const emoji = pick(issue.id);
                await reactToIssue(issue.number, emoji);
                core.info(`Reacted ${emoji} on issue #${issue.number} by ${actor}`);
                return;
              }

              if (event === 'pull_request_target') {
                const pr = context.payload.pull_request;
                if (!pr || pr.user?.type === 'Bot') return;
                const emoji = pick(pr.id);
                await reactToIssue(pr.number, emoji);
                core.info(`Reacted ${emoji} on PR #${pr.number} by ${actor}`);
              }
            } catch (error) {
              // 既に同じリアクション済みなどは無視
              if (error.status === 422) {
                core.info(`Reaction skipped (422): ${error.message}`);
                return;
              }
              throw error;
            }
